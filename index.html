<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c0c0e">
<title>cube timer ni dal</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="frame">
  <div class="topbar">
    <span>cube timer ni dal</span>
    <span style="display:flex;align-items:center;gap:10px;">
      hehe :P
      <button class="settings-btn" id="settingsBtn" title="Settings" aria-label="Settings">&#9881;</button>
    </span>
  </div>

  <div class="stage">
    <div class="scramble-box">
      <div class="scramble-label">SCRAMBLE</div>
      <div class="scramble-text" id="scrambleText">generating…</div>
      <button class="scramble-back-btn" id="prevScrambleBtn" type="button" title="go back to the previous scramble" disabled>&#8630; previous scramble</button>
    </div>
    <div class="display state-idle" id="display">0.00</div>
    <div class="hint" id="hint">press <span class="tag">SPACE</span> to start inspection</div>

    <div class="touch-controls" id="touchControls">
      <div class="pads-toggle-row">
        <button class="toggle-link" id="padsToggleLink">hide pads</button>
      </div>
      <div class="pads-row" id="padsRow">
        <button class="pad-btn" id="padLBtn" type="button">
          <span class="pad-btn-label">PAD L</span>
          <span class="pad-btn-key" id="padLBtnKey">Shift L</span>
        </button>
        <button class="pad-btn" id="padRBtn" type="button">
          <span class="pad-btn-label">PAD R</span>
          <span class="pad-btn-key" id="padRBtnKey">Shift R</span>
        </button>
      </div>
      <button class="space-btn" id="spaceBtn" type="button">TAP TO START</button>
    </div>

    <div class="panel" id="panel">
      <div class="panel-toggle-row">
        <button class="toggle-link" id="toggleLink">hide</button>
      </div>
      <div class="panel-body" id="panelBody">
        <div class="session-tabs" id="sessionTabs">
          <div class="session-tabs-scroll" id="sessionTabsScroll"></div>
          <button class="session-add-btn" id="sessionAddBtn" title="New session" aria-label="New session">+</button>
        </div>
        <div class="avg-line" id="avgLine">AVERAGE OF 5: –</div>
        <div class="solve-rows-scroll" id="solveRowsScroll">
          <div id="solveRows">
            <div class="solve-row"><span class="idx">no solves yet</span></div>
          </div>
        </div>
        <div class="extra-stats">
          <span>best: <b id="statBest">–</b></span>
          <span>ao12: <b id="statAo12">–</b></span>
          <span>mean: <b id="statMean">–</b></span>
        </div>
        <button class="clear-link" id="clearBtn">clear session</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h2>SETTINGS</h2>
    <div class="setting-row">
      <label>Pad L key</label>
      <button class="rebind-btn" id="rebindL">Shift L</button>
    </div>
    <div class="setting-row">
      <label>Pad R key</label>
      <button class="rebind-btn" id="rebindR">Shift R</button>
    </div>
    <div class="setting-row">
      <label>Inspection time</label>
      <div class="stepper">
        <button id="inspMinus">–</button>
        <span id="inspVal">15s</span>
        <button id="inspPlus">+</button>
      </div>
    </div>
    <!-- <p class="modal-note">Hold both pad keys, then release either one to start the solve — no minimum hold time. Space starts inspection / stops the solve. Click a rebind button, then press the new key.</p> -->
    <button class="close-btn" id="closeModal">Done</button>
  </div>
</div>

<div class="modal-backdrop" id="scrambleModalBackdrop">
  <div class="modal">
    <h2 id="scrambleModalTitle">SOLVE #1</h2>
    <div class="scramble-modal-text" id="scrambleModalText"></div>
    <button class="close-btn" id="scrambleModalClose">Close</button>
  </div>
</div>

<button class="cube-view-fab" id="cubeViewBtn" type="button" title="preview scramble as a cube">&#9634; view scramble </button>

<div class="modal-backdrop" id="cubeNetModalBackdrop">
  <div class="modal modal-wide">
    <h2>SCRAMBLE PREVIEW</h2>
    <div class="cube-net-wrap" id="cubeNetWrap"></div>
    <button class="close-btn" id="cubeNetModalClose">Close</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
